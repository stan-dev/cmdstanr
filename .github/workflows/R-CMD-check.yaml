---
# Github Actions workflow to check CmdStanR
# yamllint disable rule:line-length

name: Unit tests

'on':
  push:
    branches:
      - debug
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tarball_url:
        description: 'CmdStan tarball URL to test with.'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    if: "! contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-2022, r: '4.1'}
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true
      CMDSTANR_OPENCL_TESTS: ${{ matrix.config.opencl }}
      CMDSTAN_TEST_TARBALL_URL: ${{ github.event.inputs.tarball_url }}
      PKG_SYSREQS_DB_UPDATE_TIMEOUT: 30s

    steps:
      - name: cmdstan env vars
        run: |
          echo "CMDSTAN_PATH=${HOME}/.cmdstan" >> $GITHUB_ENV
        shell: bash

      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - name: Debug
        run: |
          Sys.getenv("PATH")
          Sys.getenv("RTOOLS40_HOME")
          rtools40_home <- Sys.getenv("RTOOLS40_HOME")
          rtools_bin_dir <- file.path(rtools40_home, "usr", "bin")
          file.exists(file.path(rtools_bin_dir, "make.exe"))

          ucrt64_dir <- file.path(rtools40_home, "ucrt64", "bin")
          file.exists(file.path(ucrt64_dir, "c++.exe"))
        shell: Rscript {0}
